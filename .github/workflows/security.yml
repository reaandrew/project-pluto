name: Security

on:
  schedule:
    - cron: '0 4 * * 1' # Monday 04:00 UTC
  pull_request:
    paths:
      - '**/go.mod'
      - '**/go.sum'
      - '**/package.json'
      - '**/package-lock.json'
      - 'lambdas/**'
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  GO_VERSION: '1.24.13'
  NODE_VERSION: '20'

jobs:
  # iter 0.B § win 3: moved off the per-PR critical path of deploy.yml. Runs
  # only on dep-manifest changes, weekly cron, and manual dispatch — not on
  # every PR. All checks are advisory until GHAS is enabled.
  sca:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true # ADVISORY: govulncheck stdlib findings move faster than Go releases
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}', cache-dependency-path: lambdas/go.sum }
      - name: govulncheck (advisory)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd lambdas && govulncheck ./...
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm audit --audit-level=high --omit=dev
        working-directory: frontend
        continue-on-error: true
      - uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
        continue-on-error: true # advisory until GHAS enabled
        with: { fail-on-severity: high }

  # Semgrep replaces CodeQL on this private repo because CodeQL requires GitHub
  # Advanced Security (paid). Semgrep covers Go + JS/TS + Terraform with a free
  # OSS ruleset.
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config=p/default --config=p/golang --config=p/javascript --config=p/typescript --config=p/terraform
        env:
          SEMGREP_RULES: 'p/default p/golang p/javascript p/typescript p/terraform'

  trivy-fs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  trufflehog-history:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown
