name: Deploy

on:
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests (emergency deploys only)'
        required: false
        type: boolean
        default: false
  # iter 0.B.12 — branch fast lane:
  #   push to feature branch  → quality + build only (no env, no e2e/dast/lighthouse/k6)
  #   pull_request open/sync  → full pipeline (deploy + smoke + e2e + dast + lighthouse + k6)
  #   push to main            → full pipeline against environment=production
  push:
    branches: ['**']
  pull_request:
    branches: [main]
    # 'closed' deliberately omitted (iter 0.B win #6): destroy.yml handles cleanup.
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: '1.9.8'
  AWS_REGION: 'eu-west-2'
  GO_VERSION: '1.24.13'
  NODE_VERSION: '20'
  AWS_ACCOUNT_ID: '276447169330'
  PROJECT: 'ai-website-agency'
  TF_STATE_BUCKET: 'ai-website-agency-terraform-state-276447169330'
  PREVIEW_BUCKET: 'ai-website-agency-frontend-preview-shared-276447169330'
  PROD_DOMAIN: 'agency.techar.ch'
  PREVIEW_DOMAIN: 'preview.agency.techar.ch'

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
  actions: read
  packages: write
  security-events: write
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight: emit path-filter outputs that drive the rest of the pipeline.
  # Iter 0.B § wins 1, 2, 9 + iter 0.B.12. Fires on every push (any branch) and
  # every pull_request. On main pushes the filter compares against HEAD~1 → HEAD;
  # on PRs it compares against the merge-base. On first run with no base, it falls
  # back to "everything changed" which is the safe default.
  # ---------------------------------------------------------------------------
  pre-flight:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      run:                ${{ steps.run.outputs.run }}
      frontend_changed:   ${{ steps.filter.outputs.frontend }}
      lambdas_changed:    ${{ steps.filter.outputs.lambdas }}
      terraform_changed:  ${{ steps.filter.outputs.terraform }}
      cloudflare_changed: ${{ steps.filter.outputs.cloudflare }}
      worker_changed:     ${{ steps.filter.outputs.worker }}
      code_changed:       ${{ steps.run.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            lambdas:
              - 'lambdas/**'
              - 'scripts/**'
            terraform:
              - 'terraform/**'
              - 'aws-setup/**'
            cloudflare:
              - 'cloudflare/**'
            worker:
              - 'worker/**'
      - id: run
        run: |
          CC=false
          for v in '${{ steps.filter.outputs.frontend }}' \
                   '${{ steps.filter.outputs.lambdas }}' \
                   '${{ steps.filter.outputs.terraform }}' \
                   '${{ steps.filter.outputs.cloudflare }}' \
                   '${{ steps.filter.outputs.worker }}'; do
            if [ "$v" = "true" ]; then CC=true; fi
          done
          echo "code_changed=${CC}" >> "$GITHUB_OUTPUT"
          echo "run=true"           >> "$GITHUB_OUTPUT"

  # provision-branch (the previous "validate terraform plan on branch create" job)
  # was deleted in iter 0.B.12: with `push: branches: ['**']` covering every branch
  # push, the `create` event no longer fires; env-name template substitution is
  # validated implicitly by the deploy job on PR open / sync. See spec § 0.B.12.

  # ---------------------------------------------------------------------------
  # Quality gate (parallel, path-filtered)
  # Iter 0.B § win 4: lint+test merged into one job per language to share
  # setup-go / npm-ci / checkout costs.
  # ---------------------------------------------------------------------------
  go-quality:
    name: Go quality (lint + test)
    needs: pre-flight
    if: needs.pre-flight.outputs.lambdas_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}', cache-dependency-path: lambdas/go.sum }
      - name: gofmt
        working-directory: lambdas
        run: |
          DIFF=$(gofmt -l .)
          if [ -n "$DIFF" ]; then echo "::error::gofmt diff:" >&2; echo "$DIFF" >&2; exit 1; fi
      - name: go vet
        working-directory: lambdas
        run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: lambdas
          args: --timeout=5m
      - name: go test (with coverage)
        working-directory: lambdas
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: lambdas/coverage.out
          flags: go
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  frontend-quality:
    name: Frontend quality (lint + test)
    needs: pre-flight
    if: needs.pre-flight.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend
      - run: npm run test:coverage
        working-directory: frontend
      - uses: codecov/codecov-action@v5
        if: always()
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  lint-terraform:
    needs: pre-flight
    if: needs.pre-flight.outputs.terraform_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-providers-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: tf-providers-
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '${{ env.TF_VERSION }}' }
      - run: terraform fmt -check -recursive aws-setup terraform
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --recursive

  # ---------------------------------------------------------------------------
  # Security gate (parallel, runs whenever pipeline runs — small + cheap)
  # ---------------------------------------------------------------------------
  secret-scan:
    needs: pre-flight
    if: needs.pre-flight.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Iter 0.B § win 7: shallow checkout on PR diffs (trufflehog uses base/head SHAs).
          # Full history only on push-to-main where there's no PR diff.
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --results=verified,unknown

  iac-scan:
    needs: pre-flight
    if: needs.pre-flight.outputs.terraform_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@master
        with:
          directory: '.'
          framework: terraform
          quiet: true
          soft_fail: true # advisory until baseline is clean
          output_format: sarif
          output_file_path: checkov.sarif
      # tfsec dropped (iter 0.B): aquasecurity/tfsec is in maintenance mode (succeeded
      # by Trivy upstream) and tfsec-action@v1.0.3 fetches its binary anonymously from
      # the GitHub releases API, hitting the 60/hr rate limit on busy runners. Trivy IaC
      # coverage lives in security.yml (trivy-fs job).
      # SARIF upload requires GitHub Advanced Security (paid for private repos).
      # Re-enable this step once GHAS is enabled for the repo.
      # - uses: github/codeql-action/upload-sarif@v3
      #   if: always() && hashFiles('checkov.sarif') != ''
      #   with: { sarif_file: checkov.sarif }

  # ---------------------------------------------------------------------------
  # Build (parallel; depends on quality + security)
  # ---------------------------------------------------------------------------
  discover-lambdas:
    # ALWAYS runs on a code-changed pipeline run (not just lambdas_changed). The
    # `deploy` step needs the real Lambda binaries even when only terraform/
    # changed — otherwise the placeholder bootstrap (pitfall #3) goes live and
    # smoke-tests fail with 500. The build itself is cache-keyed on a source
    # hash so an unchanged Lambda is a ~10-30s cache restore, not a rebuild.
    needs: pre-flight
    if: needs.pre-flight.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      go_lambdas: ${{ steps.list.outputs.lambdas }}
      has_go_lambdas: ${{ steps.list.outputs.has }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          if [ -d lambdas ]; then
            ARR=$(find lambdas -mindepth 2 -maxdepth 2 -name main.go -printf '%h\n' | jq -R . | jq -sc .)
          else
            ARR='[]'
          fi
          echo "lambdas=${ARR}" >> "$GITHUB_OUTPUT"
          if [ "${ARR}" = "[]" ]; then echo "has=false" >> "$GITHUB_OUTPUT"; else echo "has=true" >> "$GITHUB_OUTPUT"; fi

  build-go-lambdas:
    # See discover-lambdas — always builds when the pipeline runs (cache-keyed
    # on source hash, so unchanged Lambdas are cheap restores). go-quality is
    # only required if lambdas_changed (otherwise it's skipped); the `always()`
    # tolerance below treats a skipped quality job as success.
    needs: [pre-flight, discover-lambdas, go-quality, secret-scan]
    if: |
      always() &&
      needs.discover-lambdas.outputs.has_go_lambdas == 'true' &&
      (needs.go-quality.result == 'success' || needs.go-quality.result == 'skipped') &&
      needs.secret-scan.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        lambda: ${{ fromJson(needs.discover-lambdas.outputs.go_lambdas) }}
    steps:
      - uses: actions/checkout@v4
      - id: name
        run: echo "name=$(basename '${{ matrix.lambda }}')" >> "$GITHUB_OUTPUT"
      - id: key
        # Pitfall #2: hash this lambda + lambdas/pkg + go.mod/sum + any local replace targets.
        run: |
          DEPS=""
          if [ -f "${{ matrix.lambda }}/go.mod" ]; then
            while IFS= read -r dep; do
              rel=$(echo "$dep" | sed -E 's/.*=>[[:space:]]*//; s/[[:space:]]+v[^[:space:]]+$//')
              [ -z "$rel" ] && continue
              abs=$(cd "${{ matrix.lambda }}" && cd "$rel" 2>/dev/null && pwd || true)
              [ -n "$abs" ] && DEPS+=" $abs"
            done < <(grep -E '^\s*replace\s' "${{ matrix.lambda }}/go.mod" || true)
          fi
          HASH=$(cat \
            $(find ${{ matrix.lambda }} $DEPS -name "*.go" 2>/dev/null | sort) \
            $(find lambdas/pkg -name "*.go" 2>/dev/null | sort) \
            lambdas/go.mod lambdas/go.sum 2>/dev/null \
            | sha256sum | cut -d' ' -f1)
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: cache
        with:
          path: ${{ matrix.lambda }}/bootstrap
          key: lambda-${{ steps.name.outputs.name }}-go${{ env.GO_VERSION }}-${{ steps.key.outputs.hash }}
      - uses: actions/setup-go@v5
        if: steps.cache.outputs.cache-hit != 'true'
        with: { go-version: '${{ env.GO_VERSION }}', cache-dependency-path: lambdas/go.sum }
      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd "${{ matrix.lambda }}"
          export GOPROXY=https://proxy.golang.org,direct
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o bootstrap .
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-${{ steps.name.outputs.name }}
          path: ${{ matrix.lambda }}/bootstrap
          retention-days: 1
          if-no-files-found: error

  build-frontend:
    # ALWAYS runs when the pipeline runs — same reasoning as build-go-lambdas.
    # `npm ci` + `npm run build` for an unchanged tree completes in ~15-25s
    # thanks to the npm cache, so the cost is acceptable to keep deploys safe.
    needs: [pre-flight, frontend-quality, secret-scan]
    if: |
      always() &&
      needs.pre-flight.outputs.code_changed == 'true' &&
      (needs.frontend-quality.result == 'success' || needs.frontend-quality.result == 'skipped') &&
      needs.secret-scan.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Deploy
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Infrastructure & Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [pre-flight, build-go-lambdas, build-frontend, iac-scan]
    if: |
      always() &&
      needs.pre-flight.outputs.code_changed == 'true' &&
      (needs.build-go-lambdas.result == 'success' || needs.build-go-lambdas.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.iac-scan.result == 'success' || needs.iac-scan.result == 'skipped') &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       github.event_name == 'pull_request' ||
       github.event_name == 'workflow_dispatch')
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    outputs:
      environment:  ${{ steps.env.outputs.environment }}
      is_main:      ${{ steps.env.outputs.is_main }}
      api_endpoint: ${{ steps.urls.outputs.api_endpoint }}
      bff_endpoint: ${{ steps.urls.outputs.bff_endpoint }}
      frontend_url: ${{ steps.urls.outputs.frontend_url }}
    steps:
      - uses: actions/checkout@v4
      - id: env
        run: source ./scripts/derive-env-name.sh

      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-providers-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: tf-providers-

      - uses: actions/download-artifact@v4
        if: needs.build-go-lambdas.result == 'success'
        with: { pattern: 'lambda-*', merge-multiple: false }
      - uses: actions/download-artifact@v4
        if: needs.build-frontend.result == 'success'
        with: { name: frontend-dist, path: frontend/dist }

      - name: Place Lambda binaries
        run: |
          find lambdas -name main.go 2>/dev/null | while read -r main; do
            dir=$(dirname "$main"); name=$(basename "$dir")
            if [ -f "lambda-${name}/bootstrap" ]; then
              mv "lambda-${name}/bootstrap" "$dir/bootstrap"
              chmod +x "$dir/bootstrap"
              rm -rf "lambda-${name}"
            else
              # Lambda matrix was skipped (no lambdas_changed) — keep the placeholder
              # bootstrap committed in the repo (pitfall #3) so terraform plan succeeds.
              chmod +x "$dir/bootstrap" 2>/dev/null || touch "$dir/bootstrap"
            fi
          done

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-ai-website-agency-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '${{ env.TF_VERSION }}' }

      # `terraform fmt -check` already runs in lint-terraform — dropped here to
      # avoid the duplicate (12-ci-efficiency.md § Smaller / marginal).

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=terraform/ai-website-agency/${ENVIRONMENT}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate -no-color

      - name: Terraform plan (PR only)
        id: plan
        working-directory: terraform
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          terraform plan -no-color -input=false \
            -var="environment=${ENVIRONMENT}" \
            -out=tfplan 2>&1 | tee plan.txt
          terraform show -no-color tfplan > plan-summary.txt

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false -var="environment=${ENVIRONMENT}"

      - name: Capture endpoints
        id: urls
        working-directory: terraform
        run: |
          API_DOMAIN=$(terraform output -raw api_custom_domain)
          BFF_URL=$(terraform output -raw bff_url)
          FE_URL=$(terraform output -raw frontend_url)
          COGNITO_HOSTED_UI_DOMAIN=$(terraform output -raw cognito_hosted_ui_domain)
          COGNITO_APP_CLIENT_ID=$(terraform output -raw cognito_app_client_id)
          echo "api_endpoint=${API_DOMAIN}" >> "$GITHUB_OUTPUT"
          echo "bff_endpoint=${BFF_URL}" >> "$GITHUB_OUTPUT"
          echo "frontend_url=${FE_URL}" >> "$GITHUB_OUTPUT"
          echo "cognito_hosted_ui_domain=${COGNITO_HOSTED_UI_DOMAIN}" >> "$GITHUB_OUTPUT"
          echo "cognito_app_client_id=${COGNITO_APP_CLIENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend (PROD)
        if: env.IS_MAIN == 'true' && github.event_name == 'push' && needs.build-frontend.result == 'success'
        env:
          COGNITO_HOSTED_UI_DOMAIN: ${{ steps.urls.outputs.cognito_hosted_ui_domain }}
          COGNITO_APP_CLIENT_ID: ${{ steps.urls.outputs.cognito_app_client_id }}
        run: ./scripts/deploy-frontend.sh prod

      - name: Deploy frontend (PREVIEW)
        if: env.IS_MAIN == 'false' && needs.build-frontend.result == 'success'
        env:
          COGNITO_HOSTED_UI_DOMAIN: ${{ steps.urls.outputs.cognito_hosted_ui_domain }}
          COGNITO_APP_CLIENT_ID: ${{ steps.urls.outputs.cognito_app_client_id }}
        run: ./scripts/deploy-frontend.sh preview "${ENVIRONMENT}"

      - name: Sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: deploy-status
          message: |
            ### ai-website-agency deploy — `${{ env.ENVIRONMENT }}`

            | Stage | Status |
            |-------|--------|
            | Terraform plan  | `${{ steps.plan.outcome || 'skipped' }}` |
            | Terraform apply | success |

            **Frontend:** ${{ steps.urls.outputs.frontend_url }}
            **API:** ${{ steps.urls.outputs.api_endpoint }}
            **BFF:** ${{ steps.urls.outputs.bff_endpoint }}
            **Commit:** `${{ github.sha }}`

            <sub>Pushed by @${{ github.actor }} • [run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>

  # ---------------------------------------------------------------------------
  # Verify (gated on code_changed; iter 0.B § win 1)
  # ---------------------------------------------------------------------------
  smoke-tests:
    needs: [pre-flight, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 6
    if: |
      always() && needs.deploy.result == 'success' && needs.pre-flight.outputs.code_changed == 'true' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v4
      - name: Wait for endpoints
        run: |
          ./scripts/wait-for-endpoint.sh "${{ needs.deploy.outputs.api_endpoint }}/health" 200 30 10
          ./scripts/wait-for-endpoint.sh "${{ needs.deploy.outputs.bff_endpoint }}/health" 200 30 10
          ./scripts/wait-for-endpoint.sh "${{ needs.deploy.outputs.frontend_url }}" 200 30 10

  post-deploy-seed:
    needs: [pre-flight, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      always() && needs.deploy.result == 'success' && needs.pre-flight.outputs.code_changed == 'true' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-ai-website-agency-seed-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      - run: ./scripts/seed-environment-users.sh
        env:
          ENVIRONMENT: ${{ needs.deploy.outputs.environment }}
          E2E_TEST_USER: ${{ secrets.E2E_TEST_USER }}
          E2E_TEST_PASS: ${{ secrets.E2E_TEST_PASS }}

  e2e-tests:
    needs: [pre-flight, deploy, smoke-tests, post-deploy-seed]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      needs.smoke-tests.result == 'success' &&
      needs.post-deploy-seed.result == 'success' &&
      needs.pre-flight.outputs.code_changed == 'true' &&
      !inputs.skip_e2e &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request')
    uses: ./.github/workflows/e2e-tests.yml
    with:
      environment: ${{ needs.deploy.outputs.environment }}
      api_endpoint: ${{ needs.deploy.outputs.api_endpoint }}
      bff_endpoint: ${{ needs.deploy.outputs.bff_endpoint }}
      frontend_url: ${{ needs.deploy.outputs.frontend_url }}
    secrets: inherit

  dast-zap:
    needs: [pre-flight, deploy, smoke-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'pull_request' &&
      (needs.pre-flight.outputs.frontend_changed == 'true' || needs.pre-flight.outputs.terraform_changed == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ needs.deploy.outputs.frontend_url }}
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-scan-${{ github.run_id }}

  accessibility-lighthouse:
    needs: [pre-flight, deploy, smoke-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'pull_request' &&
      (needs.pre-flight.outputs.frontend_changed == 'true' || needs.pre-flight.outputs.terraform_changed == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - run: npm install -g @lhci/cli@0.14.0
      - name: Lighthouse CI
        run: |
          lhci autorun \
            --collect.url='${{ needs.deploy.outputs.frontend_url }}' \
            --upload.target=temporary-public-storage \
            --collect.numberOfRuns=1 \
          || echo "::warning::Lighthouse advisory failures"

  load-test-k6:
    needs: [pre-flight, deploy, smoke-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'pull_request' &&
      (needs.pre-flight.outputs.lambdas_changed == 'true' || needs.pre-flight.outputs.terraform_changed == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/k6-action@v0.3.1
        with:
          filename: e2e-tests/k6-smoke.js
        env:
          API_URL: ${{ needs.deploy.outputs.api_endpoint }}
